version: "3.8"

services:
  quality-oracle:
    build: .
    ports:
      - "8002:8002"
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Dev-only: mock MCP server with predictable tool responses for testing
  mock-mcp-server:
    build: dev/mock-mcp-server
    ports:
      - "8010:8010"
    profiles:
      - dev
    restart: unless-stopped

volumes:
  mongodb_data:
